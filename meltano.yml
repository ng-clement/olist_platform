default_environment: dev
project_id: olist-analytics-platform

# ── Environments ──────────────────────────────────────────────────────────────
environments:
  - name: dev
  - name: prod

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:

  # ── Extractor: reads all 10 core Olist CSVs ──────────────────────────────
  extractors:
    - name: tap-csv
      variant: meltanolabs
      pip_url: git+https://github.com/MeltanoLabs/tap-csv.git
      config:
        files:
          - entity: raw_orders
            path: $MELTANO_PROJECT_ROOT/data/raw/olist_orders_dataset.csv
            keys: []
          - entity: raw_order_items
            path: $MELTANO_PROJECT_ROOT/data/raw/olist_order_items_dataset.csv
            keys: []
          - entity: raw_customers
            path: $MELTANO_PROJECT_ROOT/data/raw/olist_customers_dataset.csv
            keys: []
          - entity: raw_products
            path: $MELTANO_PROJECT_ROOT/data/raw/olist_products_dataset.csv
            keys: []
          - entity: raw_sellers
            path: $MELTANO_PROJECT_ROOT/data/raw/olist_sellers_dataset.csv
            keys: []
          - entity: raw_order_payments
            path: $MELTANO_PROJECT_ROOT/data/raw/olist_order_payments_dataset.csv
            keys: []
          - entity: raw_order_reviews
            path: $MELTANO_PROJECT_ROOT/data/raw/olist_order_reviews_dataset.csv
            keys: []
          - entity: raw_marketing_qualified_leads
            path: $MELTANO_PROJECT_ROOT/data/raw/olist_marketing_qualified_leads_dataset.csv
            keys: []
          - entity: raw_closed_deals
            path: $MELTANO_PROJECT_ROOT/data/raw/olist_closed_deals_dataset.csv
            keys: []
          - entity: raw_category_translation
            path: $MELTANO_PROJECT_ROOT/data/raw/product_category_name_translation.csv
            keys: []

  # ── Loader: adswerve target-bigquery (fully working as of 2026-06-03)
  # Fix: pin numpy<2.0 (pyarrow 10.0.1 needs NumPy 1.x) and set location: US
  # (Meltano Hub defaults location to us-central1 which mismatches the US multi-region dataset).
  loaders:
    - name: target-bigquery
      variant: adswerve
      pip_url: git+https://github.com/adswerve/target-bigquery.git setuptools "numpy<2.0"
      config:
        project_id: $GCP_PROJECT_ID
        dataset_id: olist_raw
        location: US
        credentials_path: $GOOGLE_APPLICATION_CREDENTIALS

  # ── Utility: dbt transformation via Meltano dbt utility ──────────────────
  # Meltano can invoke dbt natively; Dagster drives this via DbtCliResource
  # instead, so this utility is registered for completeness and manual use.
  utilities:
    - name: dbt-bigquery
      variant: dbt-labs
      pip_url: dbt-bigquery~=1.11.0 dbt-core~=1.10.17
      config:
        project: $GCP_PROJECT_ID
        dataset: olist_analytics_staging
        location: US
        threads: 4
        keyfile: $GOOGLE_APPLICATION_CREDENTIALS

# ── Pipelines (meltano run shorthand) ─────────────────────────────────────────
# Run with:  meltano --environment prod run tap-csv target-bigquery
# Or via Dagster: orchestration/dagster/assets/meltano_assets.py
