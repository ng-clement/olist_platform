name: Deploy — Dashboard to GitHub Pages

# Fires only when dashboard files change on main.
#
# What gets deployed:
#   dashboard/index.html + dashboard/charts_data.js
#     → https://<user>.github.io/<repo>/
#
# No BigQuery credentials needed — this workflow only copies static files.
# Authentication uses the built-in GITHUB_TOKEN scoped to Pages.
#
# Prerequisites (one-time, in GitHub repository settings):
#   Settings → Pages → Source → "GitHub Actions"

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp dashboard/index.html    _site/index.html
          cp dashboard/charts_data.js _site/charts_data.js
          echo "Site contents:"
          ls -lh _site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print live URL
        run: echo "Dashboard live at ${{ steps.deployment.outputs.page_url }}"
