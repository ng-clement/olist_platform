name: olist
channels:
  - defaults
dependencies:
  - matplotlib=3.10.7
  - pandas=2.3.3
  - pip=25.3
  - python=3.11.14
  - requests=2.32.5
  - pip:
      - dagster==1.12.8
      - dagster-dbt==0.28.8
      - dagster-duckdb==0.28.8
      - dagster-duckdb-pandas==0.28.8
      - dagster-webserver==1.12.8
      - dbt-bigquery==1.11.0          # BigQuery adapter; paired with dbt-core below
      - dbt-core==1.10.17             # dbt core
      - duckdb==1.4.3
      - google-cloud-bigquery==3.20.1  # BigQuery client for ingestion
      - google-cloud-storage>=2.4,<3.2  # GCS archiving; >=2.4,<3.2 satisfies dbt-bigquery==1.11.0 upper bound
      - jupyterlab==4.2.1              # notebook server
      - meltano==4.0.8
      - pyarrow>=14.0,<19              # required by load_table_from_dataframe (BigQuery ingest)
      - numpy==1.26.4                  # numerical processing
      - plotly==5.22.0                 # interactive charts
      - python-dotenv==1.2.1
      - seaborn==0.13.2                # statistical visualisation
      - tqdm==4.67.3                   # progress bars
