version: 2

# =============================================================================
# sources.yml — all raw BigQuery tables consumed by staging models
# =============================================================================
sources:
  - name: olist_raw
    database: "{{ env_var('GCP_PROJECT_ID', 'olist-analytics-01') }}"
    schema: olist_raw
    description: "Raw Olist CSV data loaded by ingestion/ingest_to_bigquery.py"
    tables:
      - name: orders
        identifier: raw_orders
        description: "99,441 orders from 2016–2018"
        columns:
          - name: order_id
            tests: [unique, not_null]
      - name: order_items
        identifier: raw_order_items
        description: "112,650 order line items"
      - name: customers
        identifier: raw_customers
        description: "96,096 unique customers"
      - name: products
        identifier: raw_products
        description: "32,951 products"
      - name: sellers
        identifier: raw_sellers
        description: "3,095 sellers"
      - name: order_payments
        identifier: raw_order_payments
        description: "103,886 payment records"
      - name: order_reviews
        identifier: raw_order_reviews
        description: "99,224 customer reviews"
      - name: marketing_qualified_leads
        identifier: raw_marketing_qualified_leads
        description: "8,000 MQLs"
      - name: closed_deals
        identifier: raw_closed_deals
        description: "842 converted deals"
      - name: geolocation
        description: "1,000,163 raw geolocation entries (deduped to ~19K unique zip prefixes)"
      - name: product_category_translation
        identifier: raw_category_translation
        description: "71 Portuguese → English category name translations"


# =============================================================================
# models — staging layer
# =============================================================================
models:

  # ── stg_orders ────────────────────────────────────────────────────────────
  - name: stg_orders
    description: >
      Cleaned and standardised orders. Casts timestamps to DATE, computes
      delivery_days and is_on_time flag, filters out test records.
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]
      - name: order_status
        tests:
          - accepted_values:
              arguments:
                values: ['delivered','shipped','canceled','unavailable',
                         'invoiced','processing','created','approved']
      - name: delivery_days
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0 OR delivery_days IS NULL"

  # ── stg_order_items ───────────────────────────────────────────────────────
  - name: stg_order_items
    description: "Cleaned order line items with price and freight validated > 0."
    columns:
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]
      - name: seller_id
        tests: [not_null]
      - name: item_price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

  # ── stg_customers ─────────────────────────────────────────────────────────
  - name: stg_customers
    description: "Cleaned customer records with normalised city and state."
    columns:
      - name: customer_id
        tests: [unique, not_null]
      - name: customer_unique_id
        tests: [not_null]
      - name: customer_state
        tests:
          - accepted_values:
              arguments:
                values: ['AC','AL','AM','AP','BA','CE','DF','ES','GO','MA',
                         'MG','MS','MT','PA','PB','PE','PI','PR','RJ','RN',
                         'RO','RR','RS','SC','SE','SP','TO']

  # ── stg_products ──────────────────────────────────────────────────────────
  - name: stg_products
    description: "Cleaned product catalogue with English category names joined in."
    columns:
      - name: product_id
        tests: [unique, not_null]

  # ── stg_sellers ───────────────────────────────────────────────────────────
  - name: stg_sellers
    description: "Cleaned seller records."
    columns:
      - name: seller_id
        tests: [unique, not_null]

  # ── stg_payments ──────────────────────────────────────────────────────────
  - name: stg_payments
    description: "Cleaned payment records. Excludes 'not_defined' payment types."
    columns:
      - name: order_id
        tests: [not_null]
      - name: payment_type
        tests:
          - accepted_values:
              arguments:
                values: ['credit_card','boleto','voucher','debit_card']
      - name: payment_value
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

  # ── stg_reviews ───────────────────────────────────────────────────────────
  - name: stg_reviews
    description: "Cleaned order reviews. Review score validated 1–5."
    columns:
      - name: review_id
        tests: [not_null]
      - name: order_id
        tests: [not_null]
      - name: review_score
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 5

  # ── stg_marketing_leads ───────────────────────────────────────────────────
  - name: stg_marketing_leads
    description: "Cleaned MQLs joined with closed_deals to produce conversion flag."
    columns:
      - name: mql_id
        tests: [unique, not_null]
      - name: origin
        tests:
          - not_null:
              config:
                severity: warn

  # ── stg_geolocation ───────────────────────────────────────────────────────
  - name: stg_geolocation
    description: >
      Deduplicated geolocation dimension from Olist raw data.
      1,000,163 raw rows → 19,015 unique zip code prefixes.
      Deduplication: median lat/lng per prefix; mode city/state.
    columns:
      - name: zip_code_prefix
        description: "5-digit zip code prefix (INT64)"
        tests:
          - unique
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1001
                max_value: 99999
      - name: latitude
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -35.0
                max_value: 5.3
      - name: longitude
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -74.0
                max_value: -28.0
      - name: state_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['AC','AL','AM','AP','BA','CE','DF','ES','GO','MA',
                         'MG','MS','MT','PA','PB','PE','PI','PR','RJ','RN',
                         'RO','RR','RS','SC','SE','SP','TO']
      - name: region
        tests:
          - accepted_values:
              arguments:
                values: ['Southeast','South','Midwest','Northeast','North']
